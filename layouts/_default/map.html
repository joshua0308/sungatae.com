{{ partial "head.html" . }}

<body class="map-page">
<style>
    html, body { height: 100%; margin: 0; }
    body.map-page #container {
        display: flex;
        flex-direction: column;
        height: 100vh;
    }
    body.map-page #map-main {
        flex: 1 1 auto;
        min-height: 0;
    }
    body.map-page #map-main iframe {
        display: block;
        width: 100%;
        height: 100%;
        border: 0;
    }
</style>
<div id="container">
    {{ partial "header.html" . }}
    <main id="map-main">
        <iframe
            src="https://www.google.com/maps/d/embed?mid={{ .Params.mid }}"
            loading="lazy"
            allowfullscreen></iframe>
    </main>
</div>
</body>
</html>
